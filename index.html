<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch from Localhost</title>
</head>
<body>
    <button onclick="fetchData()">Fetch Data</button>
    <div id="result"></div>

    <script>
        function fetchData() {
            const url = 'https://leetcode.com/dominic89231'; // Replace with your actual endpoint on localhost

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    console.log('Data received:', data);
                    displayResult(`Data received: ${JSON.stringify(data)}`);
                })
                .catch(error => {
                    console.error('Error:', error);
                    displayResult('Error occurred. Check the console for details.');
                });
        }

        function displayResult(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<p>${message}</p>`;
        }
    </script>
</body>
</html>
